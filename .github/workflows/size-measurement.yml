name: Size Measurement

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  size-measurement:
    name: Measure Serializer Sizes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run Size Measurement
        run: dotnet run -c Release --project SizeMeasurement
